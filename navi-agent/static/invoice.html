<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Invoice — Bahi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #f5f5f7;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #ffffff;
        }
        .topbar {
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            width: 32px; height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }
        .back-btn svg { width: 16px; height: 16px; fill: white; }
        .topbar-title { color: white; font-size: 15px; font-weight: 600; }

        .loading { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
        .error { text-align: center; padding: 60px 20px; color: #ef4444; font-size: 14px; }

        .invoice-header {
            padding: 20px 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .invoice-id { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        .invoice-meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
        .status-pill {
            font-size: 11px; font-weight: 600;
            padding: 3px 10px; border-radius: 999px;
        }
        .status-unpaid { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-overdue { background: #fee2e2; color: #991b1b; }
        .status-draft { background: #e2e8f0; color: #475569; }
        .status-cancelled { background: #fce7f3; color: #9d174d; }
        .status-partly-paid { background: #dbeafe; color: #1e40af; }
        .meta-text { font-size: 12px; color: #94a3b8; }

        .section {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }
        .info-row .label { color: #64748b; }
        .info-row .value { font-weight: 500; color: #1e293b; }
        .info-row .value a { color: #2563eb; text-decoration: none; }

        .items-table { width: 100%; font-size: 13px; }
        .items-table th {
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            font-size: 11px;
            text-transform: uppercase;
            padding: 6px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .items-table th:last-child,
        .items-table td:last-child { text-align: right; }
        .items-table td {
            padding: 8px 0;
            border-bottom: 1px solid #f8fafc;
            color: #334155;
        }
        .item-name { font-weight: 500; }
        .item-detail { font-size: 12px; color: #94a3b8; }

        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
        }
        .totals-row .label { color: #64748b; }
        .totals-row .value { font-weight: 500; }
        .totals-row.grand {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            padding-top: 10px;
            border-top: 2px solid #1a1a2e;
            margin-top: 6px;
        }

        .outstanding-banner {
            margin: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            background: #fef3c7;
            border: 1px solid #fde68a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .outstanding-banner .label { font-size: 13px; color: #92400e; font-weight: 500; }
        .outstanding-banner .amount { font-size: 18px; color: #92400e; font-weight: 700; }
        .outstanding-banner.paid { background: #d1fae5; border-color: #a7f3d0; }
        .outstanding-banner.paid .label,
        .outstanding-banner.paid .amount { color: #065f46; }

        @media (min-width: 481px) {
            body { background: #e5e7eb; }
            .page { border-left: 1px solid #d1d5db; border-right: 1px solid #d1d5db; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a class="back-btn" href="/invoices" aria-label="Back">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <span class="topbar-title">Invoice Details</span>
        </div>
        <div id="content">
            <div class="loading">Loading invoice...</div>
        </div>
    </div>
    <script>
    (function () {
        var name = window.location.pathname.split("/").pop();
        var contentEl = document.getElementById("content");

        function esc(t) { var d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

        function statusClass(s) {
            if (!s) return "status-draft";
            s = s.toLowerCase();
            if (s === "paid") return "status-paid";
            if (s === "unpaid") return "status-unpaid";
            if (s === "overdue") return "status-overdue";
            if (s === "cancelled") return "status-cancelled";
            if (s.indexOf("partly") >= 0) return "status-partly-paid";
            return "status-draft";
        }

        fetch("/api/invoice/" + encodeURIComponent(name))
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(function (inv) {
                var outstanding = parseFloat(inv.outstanding_amount || 0);
                var isPaid = outstanding <= 0 && inv.status !== "Draft";

                var itemsHtml = (inv.items || []).map(function (item) {
                    return '<tr>' +
                        '<td><div class="item-name">' + esc(item.item_name || item.item_code) + '</div>' +
                        '<div class="item-detail">' + esc(item.item_code) + '</div></td>' +
                        '<td>' + item.qty + ' x ' + esc("\u20B9" + item.rate) + '</td>' +
                        '<td>' + esc("\u20B9" + item.amount) + '</td></tr>';
                }).join("");

                var html =
                    '<div class="invoice-header">' +
                        '<div class="invoice-id">' + esc(inv.name) + '</div>' +
                        '<div class="invoice-meta">' +
                            '<span class="status-pill ' + statusClass(inv.status) + '">' + esc(inv.status || "Draft") + '</span>' +
                            '<span class="meta-text">' + esc(inv.posting_date || "") + '</span>' +
                        '</div>' +
                    '</div>' +

                    (outstanding > 0 ?
                        '<div class="outstanding-banner"><span class="label">Outstanding</span><span class="amount">' + esc("\u20B9" + outstanding) + '</span></div>' :
                        isPaid ? '<div class="outstanding-banner paid"><span class="label">Fully Paid</span><span class="amount">' + esc("\u20B9" + inv.grand_total) + '</span></div>' : ''
                    ) +

                    '<div class="section">' +
                        '<div class="section-title">Details</div>' +
                        '<div class="info-row"><span class="label">Customer</span><span class="value"><a href="/customer/' + encodeURIComponent(inv.customer || "") + '">' + esc(inv.customer_name || inv.customer || "-") + '</a></span></div>' +
                        '<div class="info-row"><span class="label">Invoice Date</span><span class="value">' + esc(inv.posting_date || "-") + '</span></div>' +
                        '<div class="info-row"><span class="label">Due Date</span><span class="value">' + esc(inv.due_date || "-") + '</span></div>' +
                        '<div class="info-row"><span class="label">Currency</span><span class="value">' + esc(inv.currency || "INR") + '</span></div>' +
                    '</div>' +

                    '<div class="section">' +
                        '<div class="section-title">Items</div>' +
                        '<table class="items-table"><thead><tr><th>Item</th><th>Qty x Rate</th><th>Amount</th></tr></thead>' +
                        '<tbody>' + itemsHtml + '</tbody></table>' +
                    '</div>' +

                    '<div class="section">' +
                        '<div class="section-title">Summary</div>' +
                        '<div class="totals-row"><span class="label">Subtotal</span><span class="value">' + esc("\u20B9" + (inv.net_total || 0)) + '</span></div>' +
                        (inv.total_taxes_and_charges ? '<div class="totals-row"><span class="label">Tax' + (inv.taxes_and_charges ? ' \u2014 ' + esc(inv.taxes_and_charges.replace(' - ND', '')) : '') + '</span><span class="value">' + esc("\u20B9" + inv.total_taxes_and_charges) + '</span></div>' : '') +
                        '<div class="totals-row grand"><span>Grand Total</span><span>' + esc("\u20B9" + (inv.grand_total || 0)) + '</span></div>' +
                    '</div>';

                contentEl.innerHTML = html;
            })
            .catch(function (err) {
                contentEl.innerHTML = '<div class="error">Could not load invoice. ' + esc(String(err)) + '</div>';
            });
    })();
    </script>
</body>
</html>
