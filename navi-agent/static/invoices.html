<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Invoices — Bahi AI</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: #f5f5f7;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }
        .page {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            width: 32px; height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
        }
        .back-btn svg { width: 16px; height: 16px; fill: white; }
        .topbar-title { color: white; font-size: 15px; font-weight: 600; }

        .filters {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #f1f5f9;
            -webkit-overflow-scrolling: touch;
        }
        .filter-btn {
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #64748b;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn:active { background: #f1f5f9; }
        .filter-btn.active {
            background: #1a1a2e;
            color: white;
            border-color: #1a1a2e;
        }

        .loading { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
        .empty { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }

        .invoice-list { padding: 0; }

        .invoice-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #f8fafc;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .invoice-item:active { background: #f8fafc; }

        .invoice-item-left { flex: 1; min-width: 0; }
        .invoice-item-id { font-size: 14px; font-weight: 600; color: #1a1a2e; }
        .invoice-item-customer { font-size: 12px; color: #64748b; margin-top: 2px; }
        .invoice-item-date { font-size: 11px; color: #94a3b8; margin-top: 2px; }

        .invoice-item-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
        .invoice-item-amount { font-size: 15px; font-weight: 700; color: #1a1a2e; }

        .status-pill {
            display: inline-block;
            font-size: 10px; font-weight: 600;
            padding: 2px 8px; border-radius: 999px;
            margin-top: 4px;
        }
        .status-unpaid { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-overdue { background: #fee2e2; color: #991b1b; }
        .status-draft { background: #e2e8f0; color: #475569; }
        .status-partly-paid { background: #dbeafe; color: #1e40af; }

        .tab-bar {
            display: flex;
            border-top: 1px solid #e5e7eb;
            background: white;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-bar a {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 10px 0 8px;
            text-decoration: none;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 600;
        }
        .tab-bar a.active { color: #1a1a2e; }
        .tab-bar a svg { width: 20px; height: 20px; fill: currentColor; }

        @media (min-width: 481px) {
            body { background: #e5e7eb; }
            .page { border-left: 1px solid #d1d5db; border-right: 1px solid #d1d5db; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a class="back-btn" href="/" aria-label="Back">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <span class="topbar-title">Invoices</span>
        </div>
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="">All</button>
            <button class="filter-btn" data-filter="draft">Draft</button>
            <button class="filter-btn" data-filter="unpaid">Unpaid</button>
            <button class="filter-btn" data-filter="overdue">Overdue</button>
            <button class="filter-btn" data-filter="paid">Paid</button>
        </div>
        <div id="content" style="flex:1;overflow-y:auto;">
            <div class="loading">Loading invoices...</div>
        </div>
        <div class="tab-bar">
            <a href="/">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg>
                Chat
            </a>
            <a href="/invoices" class="active">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
                Invoices
            </a>
            <a href="/customers">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Customers
            </a>
        </div>
    </div>
    <script>
    (function () {
        var contentEl = document.getElementById("content");
        var filtersEl = document.getElementById("filters");
        var urlParams = new URLSearchParams(window.location.search);
        var activeFilter = urlParams.get("status") || "";

        function esc(t) { var d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

        function statusClass(s) {
            if (!s) return "status-draft";
            s = s.toLowerCase();
            if (s === "paid") return "status-paid";
            if (s === "unpaid") return "status-unpaid";
            if (s === "overdue") return "status-overdue";
            if (s.indexOf("partly") >= 0) return "status-partly-paid";
            return "status-draft";
        }

        function loadInvoices(filter) {
            activeFilter = filter;
            contentEl.innerHTML = '<div class="loading">Loading...</div>';

            var url = "/api/invoices";
            if (filter) url += "?status=" + encodeURIComponent(filter);

            fetch(url)
                .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
                .then(function (res) {
                    var data = res.data || [];
                    if (!data.length) {
                        contentEl.innerHTML = '<div class="empty">No invoices found.</div>';
                        return;
                    }

                    var html = '<div class="invoice-list">' + data.map(function (inv) {
                        return '<a class="invoice-item" href="/invoice/' + encodeURIComponent(inv.name) + '">' +
                            '<div class="invoice-item-left">' +
                                '<div class="invoice-item-id">' + esc(inv.name) + '</div>' +
                                '<div class="invoice-item-customer">' + esc(inv.customer || "-") + '</div>' +
                                '<div class="invoice-item-date">' + esc(inv.posting_date || "") + (inv.due_date ? ' — Due ' + esc(inv.due_date) : '') + '</div>' +
                            '</div>' +
                            '<div class="invoice-item-right">' +
                                '<div class="invoice-item-amount">' + esc("\u20B9" + (inv.grand_total || 0)) + '</div>' +
                                '<div class="status-pill ' + statusClass(inv.status) + '">' + esc(inv.status || "Draft") + '</div>' +
                            '</div>' +
                        '</a>';
                    }).join("") + '</div>';

                    contentEl.innerHTML = html;
                })
                .catch(function (err) {
                    contentEl.innerHTML = '<div class="empty">Error loading invoices.</div>';
                });
        }

        filtersEl.addEventListener("click", function (e) {
            var btn = e.target.closest(".filter-btn");
            if (!btn) return;
            filtersEl.querySelectorAll(".filter-btn").forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            loadInvoices(btn.getAttribute("data-filter"));
        });

        // Set active filter button from URL
        if (activeFilter) {
            filtersEl.querySelectorAll(".filter-btn").forEach(function (b) {
                b.classList.toggle("active", b.getAttribute("data-filter") === activeFilter);
            });
        }
        loadInvoices(activeFilter);
    })();
    </script>
</body>
</html>
