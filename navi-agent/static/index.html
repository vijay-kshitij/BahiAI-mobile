<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Bahi AI</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
        }

        /* ── Header ── */
        .header {
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 34px;
            height: 34px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg { width: 18px; height: 18px; fill: #6ee7b7; }

        .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
        .header-subtitle { font-size: 11px; opacity: 0.6; margin-top: 1px; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-btn:active { background: rgba(255,255,255,0.2); }
        .icon-btn svg { width: 15px; height: 15px; fill: currentColor; }
        .icon-btn.muted { opacity: 0.5; }

        .lang-select {
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            border-radius: 10px;
            font-size: 11px;
            padding: 6px 8px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }

        .lang-select option { color: #1a1a2e; }

        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
            -webkit-overflow-scrolling: touch;
        }

        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 100%;
        }

        .msg-row-user { align-self: flex-end; justify-content: flex-end; }
        .msg-row-bot { align-self: flex-start; justify-content: flex-start; }

        .avatar {
            width: 26px;
            height: 26px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 12px;
            font-weight: 700;
        }

        .avatar-bot {
            background: linear-gradient(135deg, #1a1a2e, #31456a);
            color: white;
        }

        .avatar-user {
            background: #e0f2fe;
            color: #0f172a;
            border: 1px solid #bae6fd;
        }

        .avatar-user svg { width: 14px; height: 14px; fill: currentColor; }

        .msg {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.55;
            word-wrap: break-word;
        }

        .msg-user {
            background: #e0f2fe;
            color: #111827;
            border: 1px solid #bae6fd;
            border-bottom-right-radius: 4px;
        }

        .msg-bot {
            background: #ffffff;
            color: #111827;
            border: 1px solid #e8e8ec;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .msg-bot strong { font-weight: 600; }

        /* ── Invoice Card ── */
        .invoice-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
            max-width: 85%;
            font-size: 13px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .invoice-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .invoice-card-id {
            font-weight: 700;
            font-size: 13px;
            color: #1a1a2e;
        }

        .invoice-card-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 999px;
        }

        .status-unpaid { background: #fef3c7; color: #92400e; }
        .status-paid { background: #d1fae5; color: #065f46; }
        .status-overdue { background: #fee2e2; color: #991b1b; }
        .status-draft { background: #e2e8f0; color: #475569; }
        .status-partly-paid { background: #dbeafe; color: #1e40af; }

        .invoice-card-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            color: #64748b;
        }

        .invoice-card-row span:last-child {
            color: #1e293b;
            font-weight: 500;
        }

        .invoice-card-total {
            border-top: 1px solid #f1f5f9;
            margin-top: 8px;
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: #1a1a2e;
            font-size: 15px;
        }

        .invoice-card-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .invoice-card-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #1a1a2e;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-align: center;
        }

        .invoice-card-btn:active { background: #e2e8f0; }

        .invoice-card-btn-primary {
            background: #1a1a2e;
            color: white;
            border-color: #1a1a2e;
        }

        /* ── Payment Card ── */
        .payment-card {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 14px;
            max-width: 85%;
            font-size: 13px;
        }

        .payment-card-header {
            font-weight: 700;
            color: #166534;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .payment-card-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            color: #15803d;
        }

        /* ── Typing ── */
        .typing {
            align-self: flex-start;
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #e8e8ec;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* ── System Message ── */
        .system-msg {
            align-self: center;
            background: #eef2ff;
            color: #334155;
            border: 1px solid #dbeafe;
            border-radius: 999px;
            padding: 5px 12px;
            font-size: 11px;
        }

        /* ── Welcome ── */
        .welcome {
            text-align: center;
            padding: 32px 16px;
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        .welcome-emoji { font-size: 32px; margin-bottom: 8px; }
        .welcome strong { color: #1a1a2e; font-weight: 600; }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .suggestion {
            border: 1px solid #d7d7df;
            background: white;
            color: #1a1a2e;
            border-radius: 999px;
            font-size: 12px;
            font-family: inherit;
            padding: 8px 14px;
            cursor: pointer;
        }

        .suggestion:active { border-color: #1a1a2e; background: #f1f5f9; }

        /* ── Pending Banner ── */
        .pending-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            margin: 0;
            background: #fff7ed;
            border-top: 1px solid #fed7aa;
            color: #9a3412;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .pending-banner.visible { display: flex; }
        .pending-banner-text {
            flex: 1;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .pending-banner-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .pending-banner-btn {
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid #fdba74;
            background: white;
            color: #9a3412;
            cursor: pointer;
            font-family: inherit;
        }
        .pending-banner-btn.confirm {
            background: #1a1a2e;
            border-color: #1a1a2e;
            color: white;
        }

        /* ── Input Area ── */
        .input-area {
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            align-items: center;
            background: white;
            flex-shrink: 0;
        }

        .input-field {
            flex: 1;
            border: 1px solid #e0e0e5;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            background: #fafafa;
        }

        .input-field:focus { border-color: #1a1a2e; background: #fff; }

        .input-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .input-btn svg { width: 17px; height: 17px; fill: currentColor; }

        .mic-btn {
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            color: #1a1a2e;
        }

        .mic-btn:active { background: #e0e7ff; }
        .mic-btn.listening { background: #ef4444; border-color: #ef4444; color: white; }
        .mic-btn:disabled { opacity: 0.4; }

        .send-btn {
            background: #1a1a2e;
            color: white;
        }

        .send-btn:active { opacity: 0.85; }
        .send-btn.loading { background: #ef4444; }

        /* ── Tab Bar ── */
        .tab-bar {
            display: flex;
            border-top: 1px solid #e5e7eb;
            background: white;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-bar a {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 10px 0 8px;
            text-decoration: none;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 600;
        }
        .tab-bar a.active { color: #1a1a2e; }
        .tab-bar a svg { width: 20px; height: 20px; fill: currentColor; }

        /* ── Desktop centering ── */
        @media (min-width: 481px) {
            body { background: #e5e7eb; }
            #app {
                border-left: 1px solid #d1d5db;
                border-right: 1px solid #d1d5db;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="header-left">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <div>
                    <div class="header-title">Bahi AI</div>
                    <div class="header-subtitle">AI Invoice Assistant</div>
                </div>
            </div>
            <div class="header-controls">
                <select id="lang-select" class="lang-select">
                    <option value="en-IN" selected>English</option>
                    <option value="hi-IN">Hindi</option>
                </select>
                <button id="voice-toggle" class="icon-btn" type="button" aria-label="Toggle voice replies">
                    <svg viewBox="0 0 24 24"><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zm-2 5.77-3-3v12l3-3h4V9h-4z"/></svg>
                </button>
                <button id="clear-btn" class="icon-btn" type="button" aria-label="Clear chat">
                    <svg viewBox="0 0 24 24"><path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v8h-2V9zm4 0h2v8h-2V9zM7 9h2v8H7V9zm-1 12h12a2 2 0 0 0 2-2V8H4v11a2 2 0 0 0 2 2z"/></svg>
                </button>
            </div>
        </div>

        <div id="messages" class="messages">
            <!-- Welcome + suggestions rendered by JS -->
        </div>

        <div id="pending-banner" class="pending-banner" role="status" aria-live="polite">
            <span class="pending-banner-text" id="pending-banner-text"></span>
            <span class="pending-banner-actions">
                <button id="pending-cancel" class="pending-banner-btn" type="button">Cancel</button>
                <button id="pending-confirm" class="pending-banner-btn confirm" type="button">Confirm</button>
            </span>
        </div>

        <div class="input-area">
            <input id="input" class="input-field" type="text" placeholder="Type a message..." autocomplete="off">
            <button id="mic-btn" class="input-btn mic-btn" type="button" aria-label="Voice input">
                <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3zm5-3a1 1 0 1 0-2 0 3 3 0 1 1-6 0 1 1 0 1 0-2 0 5 5 0 0 0 4 4.9V20H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.1A5 5 0 0 0 17 11z"/></svg>
            </button>
            <button id="send-btn" class="input-btn send-btn" type="button" aria-label="Send">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>

        <div class="tab-bar">
            <a href="/" class="active">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg>
                Chat
            </a>
            <a href="/invoices">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg>
                Invoices
            </a>
            <a href="/customers">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Customers
            </a>
        </div>
    </div>

    <script src="/static/app.js?v=11"></script>
</body>
</html>
